<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Contact Us | CROWN BUILDER</title>

  <!-- FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- ICONS -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- SWEET ALERT -->

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- CSS -->

  <link rel="stylesheet" href="style.css"/>

</head>

<body>

  <!-- FORM PAGE -->

  <section class="form-page">

    <div class="form-container">

      <!-- LEFT -->

      <div class="form-left">

        <span class="section-mini">
          GET FREE CONSULTATION
        </span>

        <h1>

          Tell Us About
          Your Dream Project

        </h1>

        <p>

          Fill the form and our team will
          contact you shortly regarding your
          construction or design requirements.

        </p>

        <div class="form-contact-info">

          <div class="contact-info-item">

            <i class="fa-solid fa-phone"></i>

            <span>
              +91 7675830896
            </span>

          </div>

          <div class="contact-info-item">

            <i class="fa-solid fa-envelope"></i>

            <span>
              crownbuilder896@gmail.com
            </span>

          </div>

          <div class="contact-info-item">

            <i class="fa-solid fa-location-dot"></i>

            <span>

              S.V.P. Colony,
              Vasundra Nagar,
              Tiruchanur,
              Tirupati,
              Andhra Pradesh - 517503

            </span>

          </div>

        </div>

      </div>

      <!-- RIGHT -->

      <div class="form-right">

        <form
          id="quoteForm"
          action="https://formspree.io/f/xnjwzvoj"
          method="POST"
        >

          <div class="input-group">

            <label>
              Full Name
            </label>

            <input
              type="text"
              name="name"
              required
              placeholder="Enter your name"
            >

          </div>

          <div class="input-group">

            <label>
              Phone Number
            </label>

            <input
              type="tel"
              name="phone"
              required
              placeholder="Enter your phone number"
            >

          </div>

          <div class="input-group">

            <label>
              Email Address
            </label>

            <input
              type="email"
              name="email"
              required
              placeholder="Enter your email"
            >

          </div>

          <div class="input-group">

            <label>
              Location
            </label>

            <input
              type="text"
              name="location"
              required
              placeholder="Your location"
            >

          </div>

          <div class="input-group">

            <label>
              Service Type
            </label>

            <select name="service">

              <option>
                Construction
              </option>

              <option>
                Interior Design
              </option>

              <option>
                Exterior Design
              </option>

            </select>

          </div>

          <div class="input-group">

            <label>
              Project Details
            </label>

            <textarea
              name="message"
              rows="5"
              placeholder="Tell us about your project"
            ></textarea>

          </div>

          <button
            type="submit"
            class="gold-btn form-btn"
          >

            Send Inquiry

          </button>

        </form>

      </div>

    </div>

  </section>

  <!-- FORM SUBMIT -->

  <script>

  const form =
  document.getElementById("quoteForm");

  form.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData =
    new FormData(form);

    const response =
    await fetch(form.action, {

      method:"POST",

      body:formData,

      headers:{
        'Accept':'application/json'
      }

    });

    if(response.ok){

      Swal.fire({

        title:"Thank You!",

        text:"Thank you for contacting CROWN BUILDER. Our team will contact you shortly regarding your project.",

        icon:"success",

        confirmButtonColor:"#d4a63a"

      }).then(() => {

        form.reset();

        window.location.href =
        "index.html";

      });

    }

    else{

      Swal.fire({

        title:"Oops!",

        text:"Something went wrong. Please try again.",

        icon:"error",

        confirmButtonColor:"#d4a63a"

      });

    }

  });

  </script>

</body>

</html>
